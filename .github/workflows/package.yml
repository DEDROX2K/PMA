name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Package app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airpaste-${{ matrix.os }}
          path: release/**
